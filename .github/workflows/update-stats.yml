name: Mise à jour stats football

on:
  schedule:
    - cron: '0 22 * * *'  # 23h Paris (hiver) / minuit (été)
  workflow_dispatch:       # Lancement manuel possible

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lancer le script
        env:
          CLE_1: ${{ secrets.CLE_1 }}
          CLE_2: ${{ secrets.CLE_2 }}
          CLE_3: ${{ secrets.CLE_3 }}
          CLE_4: ${{ secrets.CLE_4 }}
          CLE_5: ${{ secrets.CLE_5 }}
        run: node fetch-stats.js

      - name: Sauvegarder data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Stats du $(date '+%d/%m/%Y a %Hh%M')"
          git push
