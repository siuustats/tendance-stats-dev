name: Mise à jour stats football

on:
  schedule:
    - cron: '0 0 * * *'   # Minuit UTC — cherche les matchs de la veille
  workflow_dispatch:

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Lancer le script
        env:
          CLE_1: ${{ secrets.CLE_1 }}
        run: node fetch-stats.js

      - name: Sauvegarder data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Stats du $(date '+%d/%m/%Y a %Hh%M')"
          git push
