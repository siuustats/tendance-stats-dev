};

// Mapping groupe par équipe
const TEAM_GROUPS = {
  "203":"A","467":"A","451":"A","450":"A",
  "206":"B","452":"B","4398":"B","475":"B",
  "205":"C","2869":"C","2654":"C","580":"C",
  "660":"D","210":"D","628":"D","465":"D",
  "481":"E","11678":"E","4789":"E","209":"E",
  "449":"F","627":"F","466":"F","659":"F",
  "459":"G","2620":"G","469":"G","2666":"G",
  "164":"H","2597":"H","655":"H","212":"H",
  "478":"I","654":"I","4375":"I","464":"I",
  "202":"J","624":"J","474":"J","2917":"J",
  "482":"K","2850":"K","2570":"K","208":"K",
  "448":"L","477":"L","4469":"L","2659":"L",
};

// Trier les équipes par ordre alphabétique
const sortedTeams = Object.entries(TEAM_MAP).sort((a,b) => a[1].name.localeCompare(b[1].name));

function renderTeams() {
  const grid = document.getElementById('teamsGrid');
  grid.innerHTML = '';
  sortedTeams.forEach(([id, team]) => {
    const group = TEAM_GROUPS[id] || '?';
    const card = document.createElement('div');
    card.className = 'team-card';
    card.onclick = () => loadSquad(id, team, group);
    card.innerHTML = `
      <img class="team-logo" src="${team.logo}" alt="${team.name}" onerror="this.style.opacity=0.3">
      <div class="team-name">${team.name}</div>
      <div class="team-group">Groupe ${group}</div>
    `;
    grid.appendChild(card);
  });
}

async function loadSquad(teamId, team, group) {
  // Charger photos.json pour enrichir les photos manquantes
  let photosMap = {};
  try {
    const pr = await fetch('photos.json?v=' + Date.now());
    if (pr.ok) photosMap = await pr.json();
  } catch(e) {}
  window.currentTeamName = team.name;
  // Afficher la vue effectif
  document.getElementById('teamsView').style.display = 'none';
  const squadView = document.getElementById('squadView');
  squadView.style.display = 'block';
  document.getElementById('squadLogo').src = team.logo;
  document.getElementById('squadName').textContent = team.name;
  document.getElementById('squadGroup').textContent = `Groupe ${group} · Coupe du Monde 2026`;
  document.getElementById('squadContent').innerHTML = '<div class="loading">Chargement de l\'effectif...</div>';

  try {
    const url = `https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/teams/${teamId}/roster`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    const athletes = data.athletes || [];
    if (!athletes.length) throw new Error('Aucun joueur');

    // Traduction des positions en français
    const POS_FR = {
      'Goalkeeper':         'Gardien',
      'Defender':           'Défenseur',
      'Midfielder':         'Milieu',
      'Forward':            'Attaquant',
      'Attacking Midfielder':'Milieu offensif',
      'Defensive Midfielder':'Milieu défensif',
      'Central Midfielder': 'Milieu central',
      'Right Back':         'Latéral droit',
      'Left Back':          'Latéral gauche',
      'Center Back':        'Défenseur central',
      'Right Winger':       'Ailier droit',
      'Left Winger':        'Ailier gauche',
      'Striker':            'Attaquant',
      'Center Forward':     'Avant-centre',
    };

    // Grouper par position
    const positions = {};
    for (const a of athletes) {
      const rawPos = a.position?.displayName || 'Joueurs';
      const pos = POS_FR[rawPos] || rawPos;
      if (!positions[pos]) positions[pos] = [];
      positions[pos].push(a);
    }

    // Ordre d'affichage des positions
    const posOrder = ['Goalkeeper','Defender','Midfielder','Forward','Gardien','Défenseur','Milieu','Attaquant'];

    let html = '';
    const sorted = Object.entries(positions).sort((a,b) => {
      const ai = posOrder.findIndex(p => a[0].includes(p));
      const bi = posOrder.findIndex(p => b[0].includes(p));
      return (ai===-1?99:ai) - (bi===-1?99:bi);
    });

    for (const [pos, players] of sorted) {
      html += `<div class="pos-section"><div class="pos-title">${pos.toUpperCase()}</div><div class="players-grid">`;
      for (const p of players) {
        const pid      = p.athlete?.id || p.id || '';
        const espnPhoto = p.headshot?.href || '';
        const photo     = photosMap[pid] || photosMap[String(pid)] || espnPhoto || '';
        const jersey   = p.jersey || '';
        const name     = p.athlete?.displayName || p.displayName || p.fullName || '—';
        const photoEnc = encodeURIComponent(photo);
        const nameEnc  = encodeURIComponent(name);
        const teamEnc  = encodeURIComponent(currentTeamName || '');
        const posEnc   = encodeURIComponent(pos);
        const url      = `player-cdm.html?id=${pid}&name=${nameEnc}&photo=${photoEnc}&pos=${posEnc}&jersey=${jersey}&teamName=${teamEnc}`;
        html += `
          <div class="player-card" style="cursor:pointer" onclick="window.location.href='${url}'">
            <div class="player-jersey">${jersey}</div>
            <div class="player-avatar">
              ${photo ? `<img src="${photo}" onerror="this.outerHTML='⚽'" alt="${name}">` : '⚽'}
            </div>
            <div>
              <div class="player-name">${name}</div>
              <div class="player-nb">${pos}</div>
            </div>
          </div>`;
      }
      html += '</div></div>';
    }

    document.getElementById('squadContent').innerHTML = html || '<div class="error-msg">Effectif non disponible</div>';

  } catch(e) {
    document.getElementById('squadContent').innerHTML = `<div class="error-msg">Effectif non disponible pour le moment.<br>Les effectifs seront mis à jour avant la CDM.</div>`;
  }
}

function showTeams() {
  document.getElementById('teamsView').style.display = 'block';
  document.getElementById('squadView').style.display = 'none';
}

// Init — vérifier si un team ID est passé en paramètre
const urlParams = new URLSearchParams(window.location.search);
const teamParam = urlParams.get('team');
if (teamParam && TEAM_MAP[teamParam]) {
  const team = TEAM_MAP[teamParam];
  const group = TEAM_GROUPS[teamParam] || '?';
  loadSquad(teamParam, team, group);
} else {
  renderTeams();
}
