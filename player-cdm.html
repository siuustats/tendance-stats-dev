    :root {

      --s1:    #111318;

      --text:  #f0f2f8;
      --border:#1e2130;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; }

    /* Header */
    .header { display:flex; align-items:center; gap:16px; padding:20px 24px; border-bottom:1px solid var(--border); }
    .back { color:var(--m); text-decoration:none; font-size:13px; display:flex; align-items:center; gap:6px; transition:color .2s; }
    .back:hover { color:var(--g); }
    .site-name { font-family:'Bebas Neue',sans-serif; font-size:20px; color:var(--g); letter-spacing:2px; }

    /* Hero */
    .hero {
      position:relative; overflow:hidden;
      background: linear-gradient(135deg, #0d1117 0%, #111827 50%, #0a0f1a 100%);
      border-bottom:1px solid var(--border);
      padding:40px 24px 32px;
    }
    .hero::before {
      content:''; position:absolute; top:-60px; right:-40px;
      width:300px; height:300px; border-radius:50%;
      background:radial-gradient(circle, rgba(212,168,67,0.08) 0%, transparent 70%);

    .hero-inner { max-width:700px; margin:0 auto; display:flex; align-items:center; gap:28px; }
    .hero-avatar {
      width:100px; height:100px; border-radius:50%;

      font-size:36px; display:flex; align-items:center; justify-content:center;
    }
    .hero-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
    .hero-info { flex:1; }
    .hero-name { font-family:'Bebas Neue',sans-serif; font-size:42px; letter-spacing:2px; line-height:1; }
    .hero-meta { display:flex; align-items:center; gap:12px; margin-top:6px; flex-wrap:wrap; }
    .hero-team { font-size:14px; color:var(--m2); }
    .hero-badge {
      font-size:11px; font-weight:600; padding:3px 8px; border-radius:4px;
      background:rgba(212,168,67,0.15); color:var(--g); border:1px solid rgba(212,168,67,0.25);
    }
    .hero-trend { margin-top:16px; display:flex; align-items:center; gap:8px; }
    .trend-label { font-size:12px; color:var(--m); font-family:'DM Mono',monospace; }
    .trend-bar { flex:1; height:6px; background:var(--s3); border-radius:3px; max-width:200px; }
    .trend-fill { height:100%; border-radius:3px; background:linear-gradient(90deg, #d4a843, #f0c060); transition:width .8s ease; }
    .trend-score { font-family:'Bebas Neue',sans-serif; font-size:28px; color:var(--g); }

    /* Content */
    .content { max-width:700px; margin:0 auto; padding:24px; }

    .kpis { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:24px; }

    .kpi-l { font-size:10px; color:var(--m); text-transform:uppercase; letter-spacing:1px; margin-top:2px; }

    /* Section */
    .section { margin-bottom:24px; }
    .section-title {
      font-family:'Bebas Neue',sans-serif; font-size:16px; letter-spacing:2px;

    }
    .section-title::after { content:''; flex:1; height:1px; background:var(--border); }

    /* Matchs */
    .match-row {
      display:flex; align-items:center; gap:12px;
      background:var(--s1); border:1px solid var(--border); border-radius:10px;
      padding:12px 16px; margin-bottom:8px;
    }

    .match-teams { flex:1; font-size:13px; }

    .result-badge {

    .result-badge.w { background:rgba(212,168,67,0.15); color:var(--g); }
    .result-badge.l { background:rgba(255,80,80,0.15); color:var(--r); }
    .result-badge.d { background:rgba(107,114,128,0.15); color:var(--m); }

    /* Form dots */
    .form-section { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .fd {
      width:28px; height:28px; border-radius:6px; font-size:11px; font-weight:700;
      display:flex; align-items:center; justify-content:center; font-family:'DM Mono',monospace;
    }
    .fd.w { background:rgba(212,168,67,0.15); color:var(--g); border:1px solid rgba(212,168,67,0.25); }
    .fd.l { background:rgba(255,80,80,0.15); color:var(--r); border:1px solid rgba(255,80,80,0.25); }
    .fd.d { background:rgba(107,114,128,0.15); color:var(--m); border:1px solid var(--border); }

    /* Analyse */
    .analysis { background:var(--s1); border:1px solid var(--border); border-radius:12px; padding:20px; }
    .analysis-row { display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border); }
    .analysis-row:last-child { border-bottom:none; }
    .analysis-label { font-size:13px; color:var(--m2); }
    .analysis-value { font-size:13px; font-family:'DM Mono',monospace; color:var(--text); }
    .analysis-value.green { color:var(--g); }
    .analysis-value.orange { color:var(--o); }

    /* Back link */
    .footer { text-align:center; padding:32px 24px; color:var(--m); font-size:12px; }
    .footer a { color:var(--g); text-decoration:none; }

    /* Prédiction prochain match */
    .pred-next { background:var(--s1); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
    .pred-next-header { display:flex; align-items:center; gap:10px; padding:10px 16px; background:var(--s2); border-bottom:1px solid var(--border); font-size:12px; color:var(--m2); }
    .pred-next-header .match-league-badge { font-size:10px; font-weight:700; padding:2px 7px; border-radius:4px; }
    .pred-next-header .match-vs { font-weight:600; color:var(--text); font-size:13px; }
    .pred-next-header .match-date-str { margin-left:auto; font-family:'DM Mono',monospace; font-size:11px; color:var(--m); }
    .pred-next-row { display:flex; align-items:center; gap:14px; padding:14px 16px; }
    .pred-next-avatar { width:42px; height:42px; border-radius:50%; background:var(--s3); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:18px; overflow:hidden; }
    .pred-next-avatar img { width:100%; height:100%; object-fit:cover; }
    .pred-next-info { flex:1; min-width:0; }
    .pred-next-name { font-size:14px; font-weight:600; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
    .pred-next-team { font-size:11px; color:var(--m2); margin-top:2px; }
    .pred-next-right { display:flex; align-items:center; gap:12px; flex-shrink:0; }
    .pred-next-bar-wrap { width:150px; min-width:100px; display:flex; flex-direction:column; justify-content:center; }
    .pred-next-track { height:6px; background:var(--s3); border-radius:3px; overflow:hidden; margin-bottom:3px; }
    .pred-next-fill { height:100%; border-radius:3px; transition:width .8s ease; }
    .pred-next-label { font-size:11px; font-weight:700; white-space:nowrap; line-height:1.2; }
    .pred-next-stats { text-align:right; flex-shrink:0; width:64px; display:flex; flex-direction:column; justify-content:center; align-items:flex-end; gap:2px; }
    .pred-next-no-match { padding:16px; font-size:13px; color:var(--m); text-align:center; }

  @media(max-width:768px){
    /* ── HERO ── */
    .hero { padding:24px 16px 20px; }
    .hero-inner { flex-direction:column; align-items:center; text-align:center; gap:16px; }
    .hero-avatar { width:80px; height:80px; font-size:28px; }

    .content { padding:16px 12px; }

    /* ── KPIs — 2x2 ── */
    .kpis { grid-template-columns:repeat(2,1fr); gap:8px; }

    .kpi-n { font-size:26px; }

    /* ── MATCHS ── */
    .match-row { flex-wrap:wrap; gap:8px; padding:10px 12px; }
    .match-date { width:auto; }
    .match-score { width:auto; }
    .match-teams { width:100%; order:-1; }
  }

<script>
async function init() {
  const params   = new URLSearchParams(window.location.search);
  const playerId = params.get('id');
  const name     = params.get('name') ? decodeURIComponent(params.get('name')) : null;
  const photo    = params.get('photo') ? decodeURIComponent(params.get('photo')) : null;
  const teamName = params.get('teamName') ? decodeURIComponent(params.get('teamName')) : null;

  if (!name && !playerId) {
    document.body.innerHTML = '<p style="padding:40px;color:#fff">Joueur introuvable</p>';
    return;
  }

  // Photo — uniquement depuis photos.json (par espnId/id) ou paramètre URL
  // On ne touche PAS à data.json pour éviter de récupérer des stats de club
  let playerPhoto = photo || '';
  try {
    const photosRes = await fetch('photos.json?v=' + Date.now());
    if (photosRes.ok) {
      const photosMap = await photosRes.json();
      playerPhoto = photosMap[playerId] || photosMap[String(playerId)] || photo || '';
    }
  } catch(e) {}

  const avatarEl = document.getElementById('avatar');
  if (playerPhoto) {
    avatarEl.innerHTML = `<img src="${playerPhoto}" referrerpolicy="no-referrer" onerror="this.outerHTML='⚽'" alt="${name || ''}">`;
  }

  // Hero — données 100% depuis l'URL, pas depuis data.json
  const displayName = name || '—';
  document.title = `${displayName} — CDM 2026 — Tendance Stats`;
  document.getElementById('playerName').textContent = displayName;
  // Mapping nom pays → ID ESPN pour lien vers effectif
  const TEAM_IDS = {
    'Algérie':624,'Argentine':202,'Australia':628,'Autriche':474,
    'Belgique':459,'Bosnie':452,'Brésil':205,'Brasil':205,'Canada':206,
    'Cap-Vert':2597,'Colombie':208,'Congo DR':2850,'Croatie':477,
    'Curaçao':11678,'Tchéquie':450,'Équateur':209,'Égypte':2620,
    'Angleterre':448,'France':478,'Allemagne':481,'Ghana':4469,
    'Haïti':2654,'Iran':469,'Irak':4375,"Côte d'Ivoire":4789,
    'Japon':627,'Jordanie':2917,'Mexique':203,'Maroc':2869,
    'Pays-Bas':449,'Nouvelle-Zélande':2666,'Norvège':464,'Norvege':464,
    'Panama':2659,'Paraguay':210,'Portugal':482,'Qatar':4398,
    'Arabie Saoudite':655,'Écosse':580,'Sénégal':654,
    'Afrique du Sud':467,'Corée du Sud':451,'Espagne':164,
    'Suède':466,'Suisse':475,'Tunisie':659,'Turquie':465,
    'États-Unis':660,'Uruguay':212,'Ouzbékistan':2570,
  };
  const teamId = teamName ? TEAM_IDS[teamName] : null;
  const teamEl = document.getElementById('playerTeam');
  if (teamId) {
    teamEl.innerHTML = `<a href="squad.html?team=${teamId}" style="color:var(--m2);text-decoration:none;border-bottom:1px solid rgba(212,168,67,0.4);padding-bottom:1px;cursor:pointer;transition:color .2s" onmouseover="this.style.color='var(--g)'" onmouseout="this.style.color='var(--m2)'">${teamName}</a>`;
  } else {
    teamEl.textContent = teamName || '—';
  }
  document.getElementById('playerLeague').textContent = 'CDM 2026';
  document.getElementById('trendScore').textContent = '—';
  document.getElementById('trendFill').style.width = '0%';

  // ── KPIs + Forme + Historique CDM ────────────────────────────────────────
  try {
    const dataRes2 = await fetch('data.json?v=' + Date.now());
    const dataFull = await dataRes2.json();

    // Chercher les matchs CDM du joueur
    const cdmMatches = [];
    for (const m of (dataFull.matches || [])) {
      if (m.leagueId !== 6) continue;
      const found = (m.players || []).find(p => String(p.id) === String(playerId));
      if (found) cdmMatches.push({ match: m, stats: found });
    }
    cdmMatches.sort((a, b) => new Date(b.match.date) - new Date(a.match.date));

    // KPIs
    const totalGoals   = cdmMatches.reduce((s, { stats }) => s + (stats.goals || 0), 0);
    const totalAssists = cdmMatches.reduce((s, { stats }) => s + (stats.assists || 0), 0);
    const totalGames   = cdmMatches.filter(({ stats }) => stats.played !== false).length;
    const avg = totalGames > 0 ? ((totalGoals + totalAssists) / totalGames).toFixed(1) : 0;
    document.getElementById('kGoals').textContent   = totalGoals;
    document.getElementById('kAssists').textContent = totalAssists;
    document.getElementById('kGames').textContent   = totalGames;
    document.getElementById('kAvg').textContent     = avg;

    // TendScore CDM
    const cdmPlayerData = (dataFull.players || []).find(p => p.leagueId === 6 && String(p.id) === String(playerId));
    if (cdmPlayerData) {
      document.getElementById('trendScore').textContent = cdmPlayerData.signal || 0;
      document.getElementById('trendFill').style.width = (cdmPlayerData.signal || 0) + '%';
    }

    // Forme récente
    const formEl = document.getElementById('formSection');
    if (!cdmMatches.length) {
      formEl.innerHTML = '<span style="color:var(--m);font-size:13px">Aucun match CDM joué · Début le 11 juin 2026</span>';
    } else {
      formEl.innerHTML = '';
      cdmMatches.slice(0, 5).forEach(({ stats: m }) => {
        const won   = m.teamWon;
        const label = won === true ? 'V' : won === false ? 'D' : 'N';
        const cls   = won === true ? 'w' : won === false ? 'l' : 'd';
        const div   = document.createElement('div');
        div.className = `fd ${cls}`;
        div.textContent = m.played === false ? '🪑' : label;
        formEl.appendChild(div);
      });
    }

    // Historique
    const histEl = document.getElementById('matchHistory');
    if (!cdmMatches.length) {
      histEl.innerHTML = '<p style="color:var(--m);font-size:13px">Les matchs CDM apparaîtront ici dès le 11 juin 2026</p>';
    } else {
      histEl.innerHTML = '';
      cdmMatches.forEach(({ match, stats }) => {
        const date  = new Date(match.date).toLocaleDateString('fr-FR', {day:'2-digit', month:'2-digit'});
        const won   = stats.teamWon;
        const label = won === true ? 'V' : won === false ? 'D' : 'N';
        const cls   = won === true ? 'w' : won === false ? 'l' : 'd';
        const row   = document.createElement('div');
        row.className = 'match-row';
        row.innerHTML = `
          <span class="match-date">${date}</span>
          <div class="match-teams">${match.homeTeam} <span style="color:var(--m)">vs</span> ${match.awayTeam}</div>
          <span class="match-score">${match.homeGoals}-${match.awayGoals}</span>
          <div class="match-stats">
            ${stats.played === false ? `<span class="stat-pill" style="background:rgba(107,114,128,0.15);color:#6b7280">🪑 Banc</span>` : ''}
            ${stats.played !== false && stats.goals > 0 ? `<span class="stat-pill goal">⚽ ${stats.goals}B</span>` : ''}
            ${stats.played !== false && stats.assists > 0 ? `<span class="stat-pill assist">🎯 ${stats.assists}P</span>` : ''}
          </div>
          <div class="result-badge ${cls}">${label}</div>
        `;
        histEl.appendChild(row);
      });
    }
  } catch(e) {
    document.getElementById('kGoals').textContent   = 0;
    document.getElementById('kAssists').textContent = 0;
    document.getElementById('kGames').textContent   = 0;
    document.getElementById('kAvg').textContent     = 0;
    document.getElementById('formSection').innerHTML = '<span style="color:var(--m);font-size:13px">Données temporairement indisponibles</span>';
    document.getElementById('matchHistory').innerHTML = '<p style="color:var(--m);font-size:13px">Données temporairement indisponibles</p>';
  }

  // ── PRÉDICTION PROCHAIN MATCH CDM ──────────────────────────────────────
  const predEl = document.getElementById('predNext');
  try {
    const dataRes = await fetch('data.json?v=' + Date.now());
    const data = await dataRes.json();
    const cdmPlayers = data.players?.filter(p => p.leagueId === 6) || [];
    const fixtures   = data.fixtures || [];

    const cdmPlayer = cdmPlayers.find(p =>
      (playerId && (String(p.id) === String(playerId) || String(p.espnId) === String(playerId))) ||
      (name && p.name === name && p.teamName === teamName)
    );

    if (!cdmPlayer) {
      predEl.innerHTML = '<div class="pred-next-no-match">Prédictions disponibles dès le début de la CDM (11 juin 2026)</div>';
    } else {
      function calcPredScore(player, fixtureList, players) {
        const ga5 = (player.recent_goals||0) + (player.recent_assists||0);
        const ts  = player.trendScore || 0;
        const playerScore = Math.min(100, (ga5 * 15) + (ts * 0.7));
        const nextMatch = fixtureList.find(f => f.homeTeam === player.teamName || f.awayTeam === player.teamName);
        let teamScore = 50, oppScore = 50, opponent = null, matchDate = null;
        if (nextMatch) {
          const isHome = nextMatch.homeTeam === player.teamName;
          opponent  = isHome ? nextMatch.awayTeam : nextMatch.homeTeam;
          matchDate = nextMatch.date;
          const wins  = (player.last5||[]).filter(m => m.teamWon === true).length;
          const total = (player.last5||[]).length || 1;
          teamScore   = Math.round((wins / total) * 100);
          const oppP  = players.filter(p => p.teamName === opponent);
          if (oppP.length > 0) {
            const oppWins  = oppP[0]?.last5?.filter(m => m.teamWon).length || 0;
            const oppTotal = oppP[0]?.last5?.length || 1;
            oppScore = Math.round((1 - oppWins / oppTotal) * 100);
          }
        }
        return { score: Math.min(98, Math.round(playerScore*0.70 + teamScore*0.15 + oppScore*0.15)), opponent, matchDate };
      }
      function getPredColor(score) {
        if (score >= 75) return { color:'#ff9f43', colorDim:'#ff9f4388', label:'🔥 EN FEU' };
        if (score >= 55) return { color:'#ffd32a', colorDim:'#ffd32a88', label:'⚡ CHAUD' };
        if (score >= 35) return { color:'#00e5a0', colorDim:'#00e5a088', label:'📈 EN FORME' };
        if (score >= 15) return { color:'#5e81f4', colorDim:'#5e81f488', label:'💤 DISCRET' };
        return { color:'#6b7280', colorDim:'#6b728088', label:'📉 FAIBLE' };
      }
      function getRoleCDM(g, a) {
        const diff = g - a;
        if (a === 0 && g > 0) return { tag:'⚽ BUTEUR',  bg:'rgba(0,229,160,0.12)',  color:'#00e5a0' };
        if (g === 0 && a > 0) return { tag:'🎯 PASSEUR', bg:'rgba(94,129,244,0.12)', color:'#5e81f4' };
        if (diff >= 2)        return { tag:'⚽ BUTEUR',  bg:'rgba(0,229,160,0.12)',  color:'#00e5a0' };
        if (diff <= -2)       return { tag:'🎯 PASSEUR', bg:'rgba(94,129,244,0.12)', color:'#5e81f4' };
        return { tag:'⚡ DÉCISIF', bg:'rgba(255,159,67,0.12)', color:'#ff9f43' };
      }
      const { score: predScore, opponent, matchDate } = calcPredScore(cdmPlayer, fixtures, cdmPlayers);
      const predColor = getPredColor(predScore);
      const g5 = cdmPlayer.recent_goals || 0;
      const a5 = cdmPlayer.recent_assists || 0;
      const role = getRoleCDM(g5, a5);
      if (!opponent) {
        predEl.innerHTML = '<div class="pred-next-no-match">Aucun prochain match CDM programmé</div>';
      } else {
        const dateStr = matchDate
          ? new Date(matchDate).toLocaleDateString('fr-FR', {weekday:'short', day:'2-digit', month:'2-digit'})
          : '—';
        predEl.innerHTML = `
          <div class="pred-next">
            <div class="pred-next-header">
              <span class="match-league-badge" style="background:#001489;color:#fff">CDM</span>
              <span class="match-vs">${cdmPlayer.teamName} <span style="color:var(--m);font-size:11px">vs</span> ${opponent}</span>
              <span class="match-date-str">${dateStr}</span>
            </div>
            <div class="pred-next-row">
              <div class="pred-next-avatar">
                ${playerPhoto ? '<img src="' + playerPhoto + '" referrerpolicy="no-referrer" onerror="this.outerHTML=\'⚽\'" alt="' + displayName + '">' : '⚽'}
              </div>
              <div class="pred-next-info">
                <div class="pred-next-name">
                  <span>${displayName}</span>
                  <span style="font-size:9px;background:${role.bg};color:${role.color};border-radius:4px;padding:1px 6px;font-weight:700">${role.tag}</span>
                </div>
                <div class="pred-next-team">${cdmPlayer.teamName}</div>
              </div>
              <div class="pred-next-right">
                <div class="pred-next-bar-wrap">
                  <div class="pred-next-track">
                    <div class="pred-next-fill" style="width:${predScore}%;background:linear-gradient(90deg,${predColor.color},${predColor.colorDim})"></div>
                  </div>
                  <div class="pred-next-label" style="color:${predColor.color}">${predColor.label}</div>
                </div>
                <div class="pred-next-stats">
                  <div style="font-size:13px;font-weight:600;color:${predColor.color};white-space:nowrap;line-height:1">⚽${g5} 🎯${a5}</div>
                  <div style="font-size:9px;color:var(--m);text-transform:uppercase;letter-spacing:.5px;line-height:1;margin-top:3px">/5J</div>
                </div>
              </div>
            </div>
          </div>`;
      }
    }
  } catch(e) {
    predEl.innerHTML = '<div class="pred-next-no-match">Prédictions temporairement indisponibles</div>';
  }

  // Analyse
  document.getElementById('analysis').innerHTML = `
    <div class="analysis-row">
      <span class="analysis-label">Compétition</span>
      <span class="analysis-value green">Coupe du Monde 2026</span>
    </div>
    <div class="analysis-row">
      <span class="analysis-label">Sélection nationale</span>
      <span class="analysis-value">${teamName || '—'}</span>
    </div>
    <div class="analysis-row">
      <span class="analysis-label">Buts en CDM</span>
      <span class="analysis-value green">0</span>
    </div>
    <div class="analysis-row">
      <span class="analysis-label">Passes en CDM</span>
      <span class="analysis-value" style="color:var(--b)">0</span>
    </div>
    <div class="analysis-row">
      <span class="analysis-label">Statut</span>
      <span class="analysis-value" style="color:var(--y)">⏳ En attente · 11 juin 2026</span>
    </div>
  `;
}

init().catch(console.error);
</script>
</body>
</html>
